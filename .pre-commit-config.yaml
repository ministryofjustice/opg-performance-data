repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-json
    - id: no-commit-to-branch
        args:
          - --branch=main
- repo: https://github.com/sirosen/check-jsonschema
  rev: 13614ab716a3113145f1294ed259d9fbe5678ff3 # frozen: 0.37.1
  hooks:
    - id: check-jsonschema
      name: "Check Service JSON against schema definition"
      files: ^(make_a_lpa|use_a_lasting_power_of_attorney_service|complete_the_deputy_report_service)/
      types: [json]
      args: ["--schemafile", "schema.json"]
- repo: https://github.com/renovatebot/pre-commit-hooks
  rev: 1f9dca43926cb1476beab1d382a26e913762bf8d # frozen: 43.115.0
  hooks:
    - id: renovate-config-validator
